spring.application.name=FurniFlux

Datasource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:furniflux}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:qwerty}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:yourSuperSecretKeyThatIsAtLeast32BytesLongForSecurityReasons!!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Cloudinary Configuration
app.cloudinary.cloud-name= {}
app.cloudinary.api-key= {}
app.cloudinary.api-secret= {}